# ──────────────────────────────────────────────────────────────────────────────
# CD — runs on push to develop when api/ changes
#
# Steps:
#   1. Build Docker image and push to ECR (tagged :sha-XXXXXXX and :latest)
#   2. Update Lambda function code with new image
#   3. Fetch active RUN_ID from SSM and update Lambda env vars
#   4. Wait for Lambda update to complete
#   5. Run integration tests against the live API endpoint
#
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# Required GitHub variables (Settings → Variables → Actions):
#   AWS_REGION             — eu-west-1
#   ECR_REPO_URL           — 478544568263.dkr.ecr.eu-west-1.amazonaws.com/crop-disease-inference_crop-disease-mlops
#   LAMBDA_FUNCTION        — crop-disease-predict_crop-disease-mlops
#   API_URL                — https://bf17kc4e1b.execute-api.eu-west-1.amazonaws.com
#   MODEL_BUCKET           — crop-disease-models-mlflow-stg-478544568263
#   SSM_PARAMETER_NAME     — /crop-disease-mlops/staging/run_id
#
# Note: Terraform is NOT run in CD to avoid accidental resource changes.
# Infrastructure changes are applied manually via `terraform apply` or
# triggered separately. See infrastructure/README.md.
# ──────────────────────────────────────────────────────────────────────────────

name: CD

on:
  push:
    branches: [develop]
    paths:
      - "api/**"
      - ".github/workflows/cd.yaml"

# GitHub environment with optional protection rules (manual approval, reviewers)
# Configure at: Settings → Environments → staging
jobs:

  deploy:
    name: Build → Push ECR → Update Lambda → Integration Test
    runs-on: ubuntu-latest
    environment: staging

    steps:

      # ── checkout ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── AWS credentials ───────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}

      # ── ECR login ─────────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── build and push ────────────────────────────────────────────────────────
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        id: build-image
        env:
          ECR_REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPO_URL }}
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          docker build \
            -t ${{ vars.ECR_REPO_URL }}:${{ env.SHORT_SHA }} \
            -t ${{ vars.ECR_REPO_URL }}:latest \
            -f api/Dockerfile .
          echo "image_uri=${{ vars.ECR_REPO_URL }}:${{ env.SHORT_SHA }}" >> $GITHUB_OUTPUT

      - name: Push image to ECR
        run: |
          docker push ${{ vars.ECR_REPO_URL }}:${{ env.SHORT_SHA }}
          docker push ${{ vars.ECR_REPO_URL }}:latest

      # ── update Lambda code ────────────────────────────────────────────────────
      - name: Update Lambda function code
        run: |
          # wait if Lambda is already updating
          STATE=$(aws lambda get-function \
            --function-name ${{ vars.LAMBDA_FUNCTION }} \
            --query 'Configuration.LastUpdateStatus' --output text)
          while [[ "$STATE" == "InProgress" ]]; do
            echo "Lambda update in progress, waiting..."
            sleep 5
            STATE=$(aws lambda get-function \
              --function-name ${{ vars.LAMBDA_FUNCTION }} \
              --query 'Configuration.LastUpdateStatus' --output text)
          done

          aws lambda update-function-code \
            --function-name ${{ vars.LAMBDA_FUNCTION }} \
            --image-uri ${{ steps.build-image.outputs.image_uri }}

      # ── get active RUN_ID from SSM ────────────────────────────────────────────
      - name: Get RUN_ID from SSM
        id: get-run-id
        run: |
          RUN_ID=$(aws ssm get-parameter \
            --name '${{ vars.SSM_PARAMETER_NAME }}' \
            --query 'Parameter.Value' --output text)
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          echo "Active RUN_ID: ${RUN_ID}"

      # ── update Lambda env vars with active RUN_ID ─────────────────────────────
      - name: Update Lambda configuration
        run: |
          aws lambda wait function-updated \
            --function-name ${{ vars.LAMBDA_FUNCTION }}

          aws lambda update-function-configuration \
            --function-name ${{ vars.LAMBDA_FUNCTION }} \
            --environment "Variables={
              MODEL_BUCKET=${{ vars.MODEL_BUCKET }},
              RUN_ID=${{ steps.get-run-id.outputs.run_id }},
              MLFLOW_EXPERIMENT_ID=1
            }"

      # ── wait for final update ─────────────────────────────────────────────────
      - name: Wait for Lambda to be ready
        run: |
          aws lambda wait function-updated \
            --function-name ${{ vars.LAMBDA_FUNCTION }}
          echo "Lambda is ready"

      # ── integration tests against live API ────────────────────────────────────
      - name: Install test dependencies
        run: pip install pytest requests pillow

      - name: Run integration tests
        env:
          API_URL: ${{ vars.API_URL }}
        run: |
          # wait for cold start
          sleep 10
          pytest tests/integration/test_api.py -v --tb=short

      # ── deployment summary ────────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment successful ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Lambda | \`${{ vars.LAMBDA_FUNCTION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| RUN_ID | \`${{ steps.get-run-id.outputs.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ vars.API_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
